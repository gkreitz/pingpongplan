<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tennis Scheduler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <h1>PingPong<span class="accent-text">Plan</span></h1>
            </div>

            <!-- Settings Section -->
            <section class="control-panel">
                <h2>Schedule Settings</h2>
                <div class="form-group row">
                    <div class="input-wrapper">
                        <label for="start-time">Start</label>
                        <input type="time" id="start-time" value="09:00">
                    </div>
                    <div class="input-wrapper">
                        <label for="end-time">End</label>
                        <input type="time" id="end-time" value="20:00">
                    </div>
                </div>
                <div class="form-group row">
                    <div class="input-wrapper">
                        <label for="slot-length">Slot (min)</label>
                        <input type="number" id="slot-length" value="20" step="5" min="5">
                    </div>
                    <div class="input-wrapper">
                        <label for="tables-available">Tables</label>
                        <input type="number" id="tables-available" value="16" min="1">
                    </div>
                </div>
                <button id="update-settings-btn" class="btn primary-btn">Update Grid</button>
            </section>

            <!-- Classes Section -->
            <section class="control-panel">
                <h2>Classes</h2>
                <div class="class-list" id="sidebar-class-list">
                    <!-- Populated by JS -->
                </div>
                <button id="open-class-modal-btn" class="btn secondary-btn w-full" style="margin-top: 0.5rem;">+ Add Class</button>
            </section>

            <!-- Unscheduled Blocks Section -->
            <section class="control-panel flex-grow">
                <div class="header-with-actions">
                    <h2>Unscheduled Blocks</h2>
                </div>

                <form id="add-block-form" class="add-form stacked">
                    <div class="form-group row">
                        <select id="block-class-id" required>
                            <option value="" disabled selected>Select Class...</option>
                            <!-- Populated by JS -->
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="text" id="block-title" placeholder="E.g., Group games" required>
                    </div>
                    <div class="form-group row">
                        <div class="input-wrapper">
                            <label for="block-tables">Tables</label>
                            <input type="number" id="block-tables" value="4" min="1" required>
                        </div>
                        <div class="input-wrapper">
                            <label for="block-slots">Slots</label>
                            <input type="number" id="block-slots" value="3" min="1" required>
                        </div>
                    </div>
                    <button type="submit" class="btn secondary-btn w-full">Add Block</button>
                </form>

                <div class="unscheduled-list" id="unscheduled-blocks-container">
                    <!-- Populated by JS -->
                </div>
            </section>
        </aside>

        <!-- Main Schedule Area -->
        <main class="schedule-main">
            <header class="schedule-header">
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">Total Tables Active</span>
                        <span class="stat-value" id="total-tables-stat">0</span>
                    </div>
                </div>
            </header>

            <div class="schedule-scroll-container">
                <!-- Rendered by JS CSS Grid -->
                <div class="schedule-grid" id="schedule-grid">
                    <!-- Headers, drop targets, and placed blocks -->
                </div>
            </div>
        </main>
    </div>

    <!-- Class Modal -->
    <div class="modal-overlay" id="class-modal" style="display: none;">
        <div class="modal-container">
            <header class="modal-header">
                <h2>Setup New Class</h2>
                <button type="button" class="close-modal-btn" id="close-class-modal-btn">&times;</button>
            </header>
            <form id="class-modal-form" class="modal-body">
                <div class="form-group stacked">
                    <label for="modal-class-name">Class Name</label>
                    <input type="text" id="modal-class-name" placeholder="E.g., Boys U11" required>
                </div>
                <div class="form-group row">
                    <div class="input-wrapper">
                        <label for="modal-class-players">Player Count</label>
                        <input type="number" id="modal-class-players" value="16" min="4" required>
                    </div>
                </div>
                <div class="form-group stacked">
                    <label for="modal-class-structure">Structure</label>
                    <select id="modal-class-structure" required>
                        <option value="Group + play-off">Group + play-off</option>
                        <option value="Group + play-off + consolation">Group + play-off + consolation</option>
                        <option value="Only group">Only group</option>
                        <option value="Only play-off">Only play-off</option>
                        <option value="Manual">Manual (Create blocks myself)</option>
                    </select>
                </div>
                <div class="form-group stacked" id="modal-class-overlap-group" style="display: none;">
                    <label>Avoid Overlapping With</label>
                    <div id="modal-class-overlap-container" style="display: flex; flex-direction: column; gap: 0.5rem; max-height: 120px; overflow-y: auto; background: var(--bg-secondary); padding: 0.5rem; border-radius: var(--radius-md);">
                        <!-- Dynamic checkboxes injected here -->
                    </div>
                </div>
                <footer class="modal-footer">
                    <button type="button" class="btn secondary-btn" id="cancel-class-modal-btn" style="width: auto;">Cancel</button>
                    <button type="submit" class="btn primary-btn" style="width: auto;">Create Class</button>
                </footer>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
